<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Detail — Hammam Mujahid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0B0F1A; --surface: #111827; --card: #161D2E; --border: #1E2D45;
  --accent: #38BDF8; --accent2: #818CF8; --accent3: #34D399; --accent4: #FB923C;
  --text: #E2E8F0; --muted: #64748B; --white: #F8FAFC;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh; overflow-x: hidden;
}

/* Ambient glow bg */
body::after {
  content: ''; position: fixed;
  width: 700px; height: 700px; border-radius: 50%;
  background: var(--accent2); opacity: 0.04; filter: blur(150px);
  top: -200px; right: -200px; pointer-events: none;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 3rem;
  background: rgba(11,15,26,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-back {
  display: flex; align-items: center; gap: 0.6rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); padding: 0.45rem 1rem; border-radius: 6px;
  transition: all 0.2s;
}
.nav-back:hover { color: var(--accent); border-color: var(--accent); }
.nav-logo {
  font-family: 'Space Mono', monospace; font-size: 0.8rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent);
}
.nav-all {
  font-family: 'Space Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  transition: color 0.2s;
}
.nav-all:hover { color: var(--text); }

/* LAYOUT */
.page-wrap {
  max-width: 1100px; margin: 0 auto;
  padding: 4rem 3rem 6rem;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 3.5rem;
  align-items: start;
}

/* LEFT: MAIN CONTENT */
.main-col {}

/* BREADCRUMB */
.breadcrumb {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: 'Space Mono', monospace; font-size: 0.68rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 2.5rem;
}
.breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb span { color: var(--accent); }

/* PROJECT HEADER */
.project-icon-wrap {
  display: flex; align-items: center; gap: 1.25rem;
  margin-bottom: 1.5rem;
}
.project-icon {
  width: 64px; height: 64px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; border: 1px solid var(--border);
}
.project-badge {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.3rem 0.8rem; border-radius: 4px;
}
.project-date-badge {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.1em; color: var(--muted);
  background: var(--card); border: 1px solid var(--border);
  padding: 0.3rem 0.8rem; border-radius: 4px;
}

.project-title {
  font-size: clamp(2rem, 4vw, 3.25rem);
  font-weight: 700; letter-spacing: -0.03em;
  color: var(--white); line-height: 1; margin-bottom: 1.25rem;
}
.project-tagline {
  font-size: 1.05rem; color: var(--muted); line-height: 1.7;
  max-width: 560px; margin-bottom: 2rem;
}

/* TAGS ROW */
.tags-row {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  margin-bottom: 2.5rem;
}
.tag {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.3rem 0.75rem; border-radius: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); color: var(--muted);
}

/* DIVIDER */
.divider {
  height: 1px; background: var(--border); margin: 2rem 0;
}

/* SECTION LABEL */
.sec-label {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 1rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.sec-label::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--accent); }

/* DESCRIPTION */
.project-about { font-size: 0.96rem; color: var(--muted); line-height: 1.85; margin-bottom: 2rem; }
.project-about p { margin-bottom: 1rem; }
.project-about p:last-child { margin-bottom: 0; }
.project-about strong { color: var(--text); }

/* FEATURES */
.feature-list { list-style: none; margin-bottom: 2rem; }
.feature-list li {
  display: flex; gap: 1rem; align-items: flex-start;
  padding: 0.9rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.feature-list li:last-child { border-bottom: none; }
.feature-icon {
  width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; margin-top: 0.1rem;
}
.fi-blue { background: rgba(56,189,248,0.12); }
.fi-purple { background: rgba(129,140,248,0.12); }
.fi-green { background: rgba(52,211,153,0.12); }
.fi-orange { background: rgba(251,146,60,0.12); }
.feature-text {}
.feature-title { font-size: 0.92rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
.feature-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

/* ═══════════════════════════════════════════
   IMAGE GALLERY — the main feature
═══════════════════════════════════════════ */
.gallery-section { margin-bottom: 2rem; }

.gallery-main {
  position: relative;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 0.75rem;
  cursor: pointer;
}
.gallery-main img {
  width: 100%; height: 100%; object-fit: cover;
  display: none; transition: opacity 0.3s;
}
.gallery-main img.active { display: block; }

.gallery-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
  color: var(--muted); text-align: center; padding: 2rem;
}
.gallery-placeholder .icon { font-size: 3rem; opacity: 0.25; }
.gallery-placeholder p {
  font-family: 'Space Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5;
}

.gallery-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  display: flex; justify-content: space-between; width: 100%; padding: 0 0.75rem;
  pointer-events: none;
}
.gallery-nav button {
  pointer-events: all;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(11,15,26,0.8); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; backdrop-filter: blur(8px);
  opacity: 0; transition: opacity 0.2s;
}
.gallery-main:hover .gallery-nav button { opacity: 1; }
.gallery-nav button:hover { border-color: var(--accent); color: var(--accent); }

.gallery-counter {
  position: absolute; bottom: 0.75rem; right: 0.75rem;
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.1em; padding: 0.25rem 0.6rem;
  background: rgba(11,15,26,0.75); border-radius: 4px;
  color: var(--muted); backdrop-filter: blur(8px);
  display: none;
}

/* Thumbnails row */
.gallery-thumbs {
  display: flex; gap: 0.5rem; overflow-x: auto;
  padding-bottom: 0.25rem; scrollbar-width: none;
}
.gallery-thumbs::-webkit-scrollbar { display: none; }

.thumb {
  flex-shrink: 0;
  width: 72px; height: 56px;
  border-radius: 8px; overflow: hidden;
  border: 2px solid var(--border);
  cursor: pointer; transition: all 0.2s;
  background: var(--card);
}
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb.active { border-color: var(--accent); }
.thumb:hover { border-color: rgba(56,189,248,0.5); }

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 1.5rem; text-align: center;
  cursor: pointer; transition: all 0.25s;
  margin-top: 0.75rem;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(56,189,248,0.04);
}
.upload-zone input { display: none; }
.upload-zone-inner {
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
}
.upload-icon { font-size: 1.75rem; opacity: 0.4; }
.upload-label {
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.upload-sub { font-size: 0.75rem; color: var(--muted); opacity: 0.6; }
.upload-count {
  margin-top: 0.25rem;
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  color: var(--accent3); letter-spacing: 0.05em;
}

/* Gallery actions */
.gallery-actions {
  display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap;
}
.gallery-action-btn {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.35rem 0.85rem; border-radius: 6px;
  border: 1px solid var(--border); background: none;
  color: var(--muted); cursor: pointer; transition: all 0.2s;
}
.gallery-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.gallery-action-btn.danger:hover { border-color: #F87171; color: #F87171; }

/* LIGHTBOX */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
  z-index: 1000; align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 92vw; max-height: 82vh;
  object-fit: contain; border-radius: 8px;
}
.lightbox-close {
  position: absolute; top: 1.5rem; right: 1.5rem;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: var(--text); width: 40px; height: 40px; border-radius: 10px;
  font-size: 1.1rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.2s;
}
.lightbox-close:hover { background: rgba(255,255,255,0.15); }
.lightbox-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 100%; display: flex; justify-content: space-between; padding: 0 1.5rem;
}
.lightbox-nav button {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: var(--text); cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.lightbox-nav button:hover { background: rgba(255,255,255,0.18); }

/* RIGHT SIDEBAR */
.sidebar-col { position: sticky; top: 100px; }

.sidebar-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.75rem; margin-bottom: 1rem;
  position: relative; overflow: hidden;
}
.sidebar-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.sidebar-card.blue::before { background: linear-gradient(to right, var(--accent), transparent); }
.sidebar-card.purple::before { background: linear-gradient(to right, var(--accent2), transparent); }
.sidebar-card.green::before { background: linear-gradient(to right, var(--accent3), transparent); }

.sidebar-title {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 1.25rem;
}

/* Meta info rows */
.meta-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.meta-row:last-child { border-bottom: none; }
.meta-key { font-size: 0.8rem; color: var(--muted); }
.meta-val { font-size: 0.82rem; font-weight: 600; color: var(--text); text-align: right; max-width: 60%; }

/* Status badge */
.status-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; padding: 0.25rem 0.7rem;
  border-radius: 20px;
}
.status-active { background: rgba(52,211,153,0.15); color: var(--accent3); border: 1px solid rgba(52,211,153,0.3); }
.status-active::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); animation: pulse 2s infinite; }
.status-done { background: rgba(56,189,248,0.12); color: var(--accent); border: 1px solid rgba(56,189,248,0.25); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Sidebar CTA */
.sidebar-cta { width: 100%; }
.btn-full {
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  width: 100%; padding: 0.85rem 1.5rem; border-radius: 8px;
  font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-decoration: none; border: none;
  margin-bottom: 0.65rem;
}
.btn-primary { background: var(--accent); color: #0B0F1A; }
.btn-primary:hover { background: #7DD3FC; transform: translateY(-2px); }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

/* Next/Prev project nav */
.proj-nav {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.proj-nav a {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 1rem 1.25rem; text-decoration: none; transition: background 0.2s;
}
.proj-nav a:hover { background: var(--surface); }
.proj-nav a + a { border-top: 1px solid var(--border); }
.proj-nav-dir {
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.proj-nav-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
.proj-nav-icon { font-size: 1.25rem; flex-shrink: 0; }

/* RESPONSIVE */
@media (max-width: 960px) {
  .page-wrap { grid-template-columns: 1fr; gap: 2rem; }
  .sidebar-col { position: static; }
}
@media (max-width: 640px) {
  nav { padding: 1rem 1.25rem; }
  .page-wrap { padding: 2rem 1.25rem 4rem; }
  .project-title { font-size: 2rem; }
  .nav-logo { display: none; }
}
</style>
</head>

<nav>

  <div class="nav-logo">hm.dev</div>
  <a href="portfolio.html" class="nav-all">Portfolio →</a>
</nav>

<div class="page-wrap" id="pageWrap">

  <!-- MAIN COLUMN -->
  <div class="main-col">

    <div class="breadcrumb">
      <a href="portfolio.html">Home</a> /
      <a href="all-projects.html">Projects</a> /

    </div>

    <div class="gallery-section">

      <div class="gallery-actions" id="galleryActions" style="display:none;">

    </div>

    <div class="divider"></div>

    <!-- About -->
    <div class="sec-label">About This Project</div>
    <div class="project-about" id="projAbout"></div>

    <div class="divider"></div>

    <!-- Features -->

  </div>

  <!-- SIDEBAR -->

      <div class="meta-row">

      </div>
      <div class="meta-row">
        <span class="meta-key">Type</span>
        <span class="meta-val" id="sType"></span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Timeline</span>
        <span class="meta-val" id="sPeriod"></span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Platform</span>
        <span class="meta-val" id="sPlatform"></span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Team</span>
        <span class="meta-val" id="sTeam"></span>
      </div>
    </div>

    <!-- Tech Stack -->
    <div class="sidebar-card purple">
      <div class="sidebar-title">Tech Stack</div>

    </div>

    <!-- CTA -->
    <div class="sidebar-card green sidebar-cta">
      <div class="sidebar-title">Links</div>
      <a href="#" class="btn-full btn-primary" id="sGithubBtn">⬡ View on GitHub</a>

    <!-- Project nav -->
    <div class="proj-nav" id="projNav"></div>

  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-nav">
    <button onclick="changeSlide(-1, event)" title="Previous">&#8592;</button>
    <button onclick="changeSlide(1, event)" title="Next">&#8594;</button>
  </div>
</div>

// ─── PROJECT DATA ───
const PROJECTS = {
  hydro: {

    badge: '🌿 IoT · Active', badgeClass: 'badge-green',

// ─── IMAGE GALLERY STATE ───
let images = []; // { url, name }
let currentIdx = 0;

function refreshGallery() {
  const placeholder = document.getElementById('galleryPlaceholder');
  const activeImg = document.getElementById('galleryActiveImg');
  const counter = document.getElementById('galleryCounter');
  const thumbs = document.getElementById('galleryThumbs');
  const actions = document.getElementById('galleryActions');
  const uploadCount = document.getElementById('uploadCount');

  if (images.length === 0) {
    placeholder.style.display = '';
    activeImg.style.display = 'none';
    counter.style.display = 'none';
    thumbs.innerHTML = '';
    actions.style.display = 'none';
    uploadCount.textContent = '';
    return;
  }

  if (currentIdx >= images.length) currentIdx = images.length - 1;

  placeholder.style.display = 'none';
  activeImg.src = images[currentIdx].url;
  activeImg.style.display = 'block';
  counter.style.display = 'block';
  counter.textContent = `${currentIdx + 1} / ${images.length}`;
  actions.style.display = 'flex';
  uploadCount.textContent = `${images.length} image${images.length > 1 ? 's' : ''} uploaded`;

  // Thumbs
  thumbs.innerHTML = '';
  images.forEach((img, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i === currentIdx ? ' active' : '');
    t.innerHTML = `<img src="${img.url}" alt="${img.name}">`;
    t.onclick = () => { currentIdx = i; refreshGallery(); };
    thumbs.appendChild(t);
  });

  // Lightbox
  document.getElementById('lightboxImg').src = images[currentIdx].url;
}

function changeSlide(dir, e) {
  if (e) e.stopPropagation();
  if (images.length === 0) return;
  currentIdx = (currentIdx + dir + images.length) % images.length;
  refreshGallery();
}

function removeCurrentImage() {
  if (images.length === 0) return;
  images.splice(currentIdx, 1);
  if (currentIdx >= images.length) currentIdx = Math.max(0, images.length - 1);
  refreshGallery();
}

function clearAllImages() {
  if (!confirm('Remove all images?')) return;
  images = []; currentIdx = 0;
  refreshGallery();
}

function openLightbox() {
  if (images.length === 0) return;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// File upload
document.getElementById('imageUpload').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      images.push({ url: ev.target.result, name: file.name });
      loaded++;
      if (loaded === files.length) {
        currentIdx = images.length - files.length; // go to first new image
        refreshGallery();
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

// Drag & drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      images.push({ url: ev.target.result, name: file.name });
      loaded++;
      if (loaded === files.length) { currentIdx = images.length - files.length; refreshGallery(); }
    };
    reader.readAsDataURL(file);
  });
});

document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'ArrowLeft') changeSlide(-1);
    if (e.key === 'ArrowRight') changeSlide(1);
    if (e.key === 'Escape') closeLightbox();
  }
});

    'badge-green': 'rgba(52,211,153,0.15)',
    'badge-orange': 'rgba(251,146,60,0.15)',

    'badge-blue': '#38BDF8', 'badge-purple': '#818CF8',
    'badge-green': '#34D399', 'badge-orange': '#FB923C',
  };
  const borders = {
    'badge-blue': 'rgba(56,189,248,0.3)', 'badge-purple': 'rgba(129,140,248,0.3)',
    'badge-green': 'rgba(52,211,153,0.3)', 'badge-orange': 'rgba(251,146,60,0.3)',

}

    'badge-purple': { bg: 'rgba(129,140,248,0.15)', c: '#818CF8', b: 'rgba(129,140,248,0.3)' },

  // About

  // Sidebar meta

  document.getElementById('sPeriod').textContent = m.period;
  document.getElementById('sPlatform').textContent = m.platform;
  document.getElementById('sTeam').textContent = m.team;

  // Stack
  document.getElementById('sTechStack').innerHTML = p.stack.map(t => `<span class="tag">${t}</span>`).join('');

  // Links
  const ghBtn = document.getElementById('sGithubBtn');
  const liveBtn = document.getElementById('sLiveBtn');
  if (m.github && m.github !== '#') ghBtn.href = m.github;
  if (!m.live) liveBtn.style.display = 'none';
  else if (m.live !== '#') liveBtn.href = m.live;

  // Prev/Next nav
  const navEl = document.getElementById('projNav');
  let navHtml = '';
  if (p.prev) navHtml += `<a href="project-detail.html?id=${p.prev.id}"><div class="proj-nav-dir">← Previous</div><div class="proj-nav-name">${p.prev.title}</div></a>`;

  navEl.innerHTML = navHtml;
}
